apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: platform-gateway
spec:
  selector:
    istio: ingressgateway
  servers:
    - port: { number: 443, name: https, protocol: HTTPS }
      tls: { mode: SIMPLE, credentialName: platform-tls }
      hosts: ["*.platform.quantexa.internal"]
